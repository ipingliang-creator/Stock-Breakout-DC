# Copy this file into the PUBLIC data repo (Stock-Breakout-DC) at
# .github/workflows/data-collect.yml
#
# It runs the HEAVY data collection on the public repo's *unlimited* Actions
# minutes, then commits the cached prices + fundamentals back here. It does NOT
# run any strategy/scanner code — the private engine is checked out only to use
# its data layer, and only data/ is committed (strategy code never lands here).
#
# Required secrets on Stock-Breakout-DC (Settings → Secrets → Actions):
#   PRIVATE_REPO_TOKEN   - a fine-grained PAT with *read* access to the private
#                          repo (ipingliang-creator/stock-breakout-bot)
#   ALPACA_API_KEY, ALPACA_SECRET_KEY, ALPACA_BASE_URL
#   SBS_SEC_USER_AGENT   - your contact email (SEC EDGAR requires it)
name: Data Collection

on:
  schedule:
    - cron: "0 22 * * 1-5"      # weekday evenings (after the US close)
  workflow_dispatch:
    inputs:
      provider:
        description: "Data provider"
        type: choice
        default: alpaca
        options: [alpaca, yfinance, stooq]

concurrency:
  group: data-collect
  cancel-in-progress: false

permissions:
  contents: write               # commit refreshed data back to this repo

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      PROVIDER: ${{ github.event.inputs.provider || 'alpaca' }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
      SBS_SEC_USER_AGENT: ${{ secrets.SBS_SEC_USER_AGENT }}
      SBS_MIN_DOLLAR_VOLUME: "1000000"     # relaxed for Alpaca IEX volume
    steps:
      - name: Check out the data repo (this public repo)
        uses: actions/checkout@v4

      - name: Check out the engine (private) — for the data layer only
        uses: actions/checkout@v4
        with:
          repository: ipingliang-creator/stock-breakout-bot
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: _engine

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: python -m pip install -r _engine/requirements.txt

      - name: Collect prices + fundamentals (no strategy logic runs)
        working-directory: _engine
        run: |
          # Reuse any cache already published in the data repo (incremental).
          mkdir -p data/cache && cp -r ../data/cache/. data/cache/ 2>/dev/null || true
          python -m sbs.cli --provider "$PROVIDER" update-data

      - name: Publish the refreshed data back to this repo
        run: |
          rm -rf data/cache && mkdir -p data/cache
          cp -r _engine/data/cache/. data/cache/
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/cache
          git commit -m "data: refresh $(date -u +%F)" || echo "no changes to commit"
          git push
